<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
        margin: 0;
        padding: 0;
    }
     /*------------Project--------------*/
 
      .products-container {
        width: 100%;
        height: 100vh;
        background: linear-gradient(rgb(4, 19, 41),rgb(36, 29, 95),rgb(16, 21, 27));
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 45px;
      }
      .product-header {
        width: 80%;
        height: 20%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        flex-direction: column;
      }
      .title {
        font-size: 60px;
        color:aliceblue;
        font-family: "Open Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: 500;
        font-style: normal;
        font-variation-settings: "wdth" 100;
      }
 
      .products {
        height: auto;
        width: 80%;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 30px;
      }
 
      .product-card {
        width: 100%;
        height: 400px;
        border-radius: 70px;
        background-color: rgba(0, 0, 0, 0.144);
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
        border: 1px solid rgb(80, 80, 80);
        transition-duration: 0.4s;
      }
       .card-image {
            width: 50%;
            height: 70%;
        }
 
        .card-content {
            width: 80%;
            height: 20%;
            text-align: center;
        }
 
        img{
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        h1{
          color: black;
        }
        h3{
            font-family: "Open Sans", sans-serif;
            color: aliceblue;
            text-align: center;
        }
      .product-card:hover {
        border-color: rgba(0, 167, 167, 0.507);
        transition-duration: 0.2s;
        box-shadow: 5px 5px 50px 10px rgba(111, 0, 255, 0.199);
      }
      @media (min-width: 100px) and (max-width: 500px) {
        .products{
            grid-template-columns: 1fr ;
        }
        
      }
</style>
</head>
<body>
  
    <!--Project-->
    <main class="products-container" id="project">
      <div class="product-header">
        <h1 class="title">Bootstrap Projects</h1>
      </div>
      <div class="products">
        <!--card 1-->
       <a href="../bootstrap/project-class/main.html">
         <div class="product-card">
        <div class="card-image">
          <img src="https://classhud.com/assets/media/uploads/listing/logo/success-coaching-centre.png">
        </div>
       
          <div class="card-content1">
            <h3>Success Coaching Centre</h3>
          </div>
        </div>
       </a>
       </div>
     
       </main>
       </body>
       </html>
