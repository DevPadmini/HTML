<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admmision</title>
    <link rel="stylesheet" href="webpage.css" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link />

    <!-- Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div
      class="container-fluid vh-100 d-flex justify-content-center align-items-center row"
    >
      <div class="card p-4 col-md-5 shadow w-50">
        <h3 class="text-center mb-3">Login</h3>
        <form>
          <!-- NAME -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              class="form-control"
              type="text"
              placeholder="Enter Your Email"
            />
          </div>

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">Passsward</label>
            <input
              class="form-control"
              type="email"
              placeholder="Enter Your Passsward"
            />
          </div>

          <!-- Forget -->
          <div class="mb-3">
            <label class="form-label text-end text-primary w-100"
              >Forget Passsward</label
            >
          </div>
          <!-- BUTTON -->
          <div class="d-grid">
            <button class="btn btn-success" type="submit">Submit</button>
          </div>

          <div class="mt-3">
            <div class="text-center w-100">Don't have a account?
            <label class="form-label text-center text-primary w-100"
              >Sign-up</label
            >
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
