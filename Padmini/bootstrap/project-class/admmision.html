<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission</title>

    <!-- Attach CSS file -->
    <link rel="stylesheet" href="coach.css" />

    <!-- BOOTSRAP LINK -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- SCRIPT LINK  -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <style>
        .container-1 {
        width: 100%;
        height: 800px;
        background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7V7H2nq14GyXzjmIfXgTfZkrm4l4a6hhUuQ&s");

        background-repeat: no-repeat;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5 w-50">
      <div class="card shadow">
        <!-- Card Header -->
        <div class="card-header bg-primary text-white text-center">
          <h3>Admission Form</h3>
        </div>

        <!-- Card Body -->
        <div class="card-body">
          <form>
            <!-- NAME -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                class="form-control"
                type="text"
                placeholder="Enter Your Name"
              />
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                class="form-control"
                type="email"
                placeholder="Enter Your Email"
              />
            </div>

            <!-- PHONE -->
            <div class="mb-3">
              <label class="form-label">Phone No</label>
              <input
                class="form-control"
                type="text"
                placeholder="Enter Your Phone No"
              />
            </div>
            <!-- Gender -->
            <div class="mb-3">
              <label class="form-label">Gender</label>

              <div>
                <!-- Female -->
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" />

                  <label class="form-check-label" for="female"> Female </label>
                </div>

                <!-- Male -->
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" />

                  <label class="form-check-label" for="male"> Male </label>
                </div>
              </div>
            </div>

            <!-- course  -->
            <div class="mb-3">
              <label class="form-label">Select Cources</label>
              <select class="form-select">
                <option selected>Choose</option>
                <option>JEE</option>
                <option>NEET</option>
                <option>Competitive-Exams-After-12th</option>
               
              </select>
            </div>

            <!-- <Address></Address> -->
            <div class="mb-3">
              <label class="form-label">Address Aeaa</label>
              <textarea class="form-control" ></textarea>
            </div>

            <!-- checknox  -->
            <div class="mb-3">
              <input type="checkbox" class="form-check-input" />
              <label class="form-label">I agree teams and conditions.</label>
            </div>
            

            <!-- BUTTON -->
            <div class="d-grid">
              <button class="btn btn-success" type="submit">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    </body>
    </html>
