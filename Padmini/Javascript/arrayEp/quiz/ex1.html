<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        scroll-behavior: smooth;
      }

      body {
        width: 100vw;
        height: 100vh;

        background: linear-gradient(
          rgb(29, 107, 143),
          rgb(15, 42, 83),
          rgb(36, 22, 73),
          rgb(8, 7, 54)
        );
      }

      .image-bg {
        width: 100%;
        height: 100vh;
        object-fit: cover;
      }
      .text {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-size: 30px;
        font-weight: bold;
        font-size: 300%;
        padding: 200px;
        margin-top: 5%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .btn {
        height: 7%;
        width: 10%;
        position: absolute;
        top: 80px;
        left: 620px;
        padding: 10px 20px;
        border: none;
        background-color: rgba(20, 42, 108, 0.578);
        color: white;
        font-size: 18px;
        border-radius: 15px;
        border: 4px solid rgb(15, 187, 235);
        cursor: pointer;
        margin-top: 30%;
      }
      .box {
        width: 100%;
        height: 100%;
        background-color: antiquewhite;
      }
      .btn:hover {
        background-color: rgb(15, 187, 235);
        transition: 0.3s;
      }
    </style>
  </head>

  <body>
    <main class="main-box">
      <div class="start">
        <img
          class="image-bg"
          src="https://t3.ftcdn.net/jpg/05/60/26/26/360_F_560262652_SMg7tie3Zii0zFT9LYkKMqrNrPcU5owB.jpg"
        />
        <div class="text">
          <h1>QUIZ MASTER</h1>
          <p>Are You Ready For The Ultimate Challenge?</p>
        </div>
        <button class="btn"><h2>Start</h2></button>
        <span class="border border-info"></span>
      </div>
    </main>
  </body>
</html>
