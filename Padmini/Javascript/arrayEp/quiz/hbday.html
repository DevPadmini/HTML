<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Animation</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:linear-gradient(135deg,#ff4e8a,#6a5cff);
      font-family:Arial, sans-serif;
    }

    .container{
      text-align:center;
      color:white;
      animation:zoom 2s infinite alternate;
    }

    h1{
      font-size:70px;
      text-shadow:0 0 20px yellow;
      animation:glow 1s infinite alternate;
    }

    p{
      font-size:35px;
      margin-top:10px;
    }

    .emoji{
      font-size:60px;
      animation:bounce 1s infinite;
      display:inline-block;
      margin:10px;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px white;
      }
      to{
        text-shadow:0 0 30px yellow, 0 0 50px orange;
      }
    }

    @keyframes bounce{
      0%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-20px);
      }
      100%{
        transform:translateY(0);
      }
    }

    @keyframes zoom{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.1);
      }
    }

    .balloon{
      position:absolute;
      bottom:-100px;
      font-size:50px;
      animation:fly 8s linear infinite;
    }

    .balloon:nth-child(1){
      left:10%;
      animation-delay:0s;
    }

    .balloon:nth-child(2){
      left:30%;
      animation-delay:2s;
    }

    .balloon:nth-child(3){
      left:50%;
      animation-delay:4s;
    }

    .balloon:nth-child(4){
      left:70%;
      animation-delay:1s;
    }

    .balloon:nth-child(5){
      left:90%;
      animation-delay:3s;
    }

    @keyframes fly{
      0%{
        transform:translateY(0);
      }
      100%{
        transform:translateY(-120vh);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="emoji">🎂 🎉 🎈</div>

    <h1>Happy Birthday</h1>

    <p>🎊 Have a Wonderful Day 🎊</p>

    <div class="emoji">🥳 🎁 💖</div>
  </div>

  <div class="balloon">🎈</div>
  <div class="balloon">🎉</div>
  <div class="balloon">🎂</div>
  <div class="balloon">🎁</div>
  <div class="balloon">🥳</div>
  

</body>
</html>
