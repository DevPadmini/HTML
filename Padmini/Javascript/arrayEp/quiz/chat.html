<!DOCTYPE html>
<html>
<head>
  <title>Quiz Game</title>
</head>
<body>

<h1>Quiz Game</h1>

<h2 id="question"></h2>

<button onclick="checkAnswer('A')" id="a"></button>
<button onclick="checkAnswer('B')" id="b"></button>
<button onclick="checkAnswer('C')" id="c"></button>
<button onclick="checkAnswer('D')" id="d"></button>

<h3 id="score"></h3>

<script>

let quiz = [
{
    question: "What is 2 + 2 ?",
    A: "3",
    B: "4",
    C: "5",
    D: "6",
    answer: "B"
},
{
    question: "HTML stands for ?",
    A: "Hyper Text Markup Language",
    B: "High Text Machine Language",
    C: "Home Tool Markup Language",
    D: "Hyper Tool Multi Language",
    answer: "A"
},
{
    question: "CSS is used for ?",
    A: "Database",
    B: "Styling",
    C: "Server",
    D: "Compiler",
    answer: "B"
}
];

let currentQuestion = 0;
let points = 0;

function loadQuestion(){

    document.getElementById("question").innerText =
    quiz[currentQuestion].question;

    document.getElementById("a").innerText =
    quiz[currentQuestion].A;

    document.getElementById("b").innerText =
    quiz[currentQuestion].B;

    document.getElementById("c").innerText =
    quiz[currentQuestion].C;

    document.getElementById("d").innerText =
    quiz[currentQuestion].D;
}

function checkAnswer(userAnswer){

    if(userAnswer == quiz[currentQuestion].answer){
        points++;
    }

    currentQuestion++;

    if(currentQuestion < quiz.length){
        loadQuestion();
    }
    else{
        document.body.innerHTML =
        "<h1>Quiz Finished</h1>" +
        "<h2>Your Score: " + points + "/" + quiz.length + "</h2>";
    }
}

loadQuestion();

</script>

</body>
</html>
