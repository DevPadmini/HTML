<!doctype html>
<html lang="en">
  <head>
    <title>Object Methods</title>
  </head>
  <body>
    <p><b>A method is a function definition stored as a property value.</b></p>
    
    <p id="demo"></p>

    <script>
      const person = {
        firstName: "Padmini",
        lastName: "Bhange",
        age: 18,
        fullName: function () {
          return this.firstName + " " + this.lastName + " " + this.age;
        },
      };

      document.getElementById("demo").innerHTML = person.fullName();
    </script>
  </body>
</html>
