<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
}

.player{
    width:380px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

.cover{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:15px;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-info{
    text-align:center;
    margin-top:15px;
}

.song-info h3{
    margin-bottom:5px;
}

.song-info p{
    color:gray;
}

.progress-container{
    margin-top:20px;
}

.progress{
    width:100%;
    cursor:pointer;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-top:5px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#243b55;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.controls button:hover{
    transform:scale(1.1);
}

.volume{
    margin-top:20px;
}

.volume label{
    font-weight:bold;
}

.volume input{
    width:100%;
}

.playlist{
    margin-top:20px;
    max-height:150px;
    overflow-y:auto;
}

.playlist ul{
    list-style:none;
}

.playlist li{
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}

.playlist li:hover{
    background:#f1f1f1;
}

.active{
    background:#243b55;
    color:white;
}
</style>
</head>
<body>

<div class="player">

    <h2>🎵 Music Player</h2>

    <div class="cover">
        <img id="cover"
        src="https://picsum.photos/300/300" alt="">
    </div>

    <div class="song-info">
        <h3 id="title">Song Name</h3>
        <p id="artist">Artist</p>
    </div>

    <div class="progress-container">
        <input type="range" id="progress"
        class="progress" value="0">

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="volume">
        <label>🔊 Volume</label>
        <input type="range" id="volume"
        min="0" max="1" step="0.1" value="1">
    </div>

    <div class="playlist">
        <ul id="playlist"></ul>
    </div>

</div>

<audio id="audio"></audio>

<script>

const songs = [
{
title:"Song One",
artist:"Artist One",
src:"song1.mp3",
cover:"https://picsum.photos/id/237/300/300"
},
{
title:"Song Two",
artist:"Artist Two",
src:"song2.mp3",
cover:"https://picsum.photos/id/1025/300/300"
},
{
title:"Song Three",
artist:"Artist Three",
src:"song3.mp3",
cover:"https://picsum.photos/id/1062/300/300"
}
];

const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

const volume = document.getElementById("volume");
const playlist = document.getElementById("playlist");

let songIndex = 0;

loadSong(songIndex);

function loadSong(index){

title.textContent = songs[index].title;
artist.textContent = songs[index].artist;
cover.src = songs[index].cover;
audio.src = songs[index].src;

updatePlaylist();
}

function playSong(){
audio.play();
playBtn.textContent = "⏸";
}

function pauseSong(){
audio.pause();
playBtn.textContent = "▶";
}

playBtn.addEventListener("click",()=>{
if(audio.paused){
playSong();
}else{
pauseSong();
}
});

nextBtn.addEventListener("click",()=>{
songIndex++;
if(songIndex >= songs.length){
songIndex = 0;
}
loadSong(songIndex);
playSong();
});

prevBtn.addEventListener("click",()=>{
songIndex--;
if(songIndex < 0){
songIndex = songs.length - 1;
}
loadSong(songIndex);
playSong();
});

audio.addEventListener("timeupdate",()=>{

progress.value =
(audio.currentTime / audio.duration) * 100 || 0;

current.textContent = formatTime(audio.currentTime);

duration.textContent =
formatTime(audio.duration);
});

progress.addEventListener("input",()=>{
audio.currentTime =
(progress.value / 100) * audio.duration;
});

volume.addEventListener("input",()=>{
audio.volume = volume.value;
});

audio.addEventListener("ended",()=>{
songIndex++;
if(songIndex >= songs.length){
songIndex = 0;
}
loadSong(songIndex);
playSong();
});

function formatTime(time){

if(isNaN(time)) return "0:00";

let min = Math.floor(time / 60);
let sec = Math.floor(time % 60);

if(sec < 10){
sec = "0" + sec;
}

return `${min}:${sec}`;
}

function createPlaylist(){

songs.forEach((song,index)=>{

let li = document.createElement("li");

li.textContent =
`${song.title} - ${song.artist}`;

li.addEventListener("click",()=>{
songIndex = index;
loadSong(songIndex);
playSong();
});

playlist.appendChild(li);

});

}

function updatePlaylist(){

const items = playlist.querySelectorAll("li");

items.forEach((item,index)=>{
item.classList.remove("active");

if(index === songIndex){
item.classList.add("active");
}
});

}

createPlaylist();

</script>

</body>
</html>
