<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.calculator{
    width:340px;
    background:#111827;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
    font-size:2rem;
    text-align:right;
    padding:15px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:1.3rem;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#374151;
    color:white;
}

.operator{
    background:#f59e0b;
    color:white;
}

.equal{
    background:#10b981;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#ef4444;
    color:white;
}

.delete{
    background:#6366f1;
    color:white;
}
</style>
</head>
<body>

<div class="calculator">

<input
type="text"
class="display"
id="display"
readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="delete" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

const display =
document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value =
    display.value.slice(0,-1);
}

function calculate(){

    try{
        display.value =
        eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

/* Keyboard Support */

document.addEventListener("keydown",(e)=>{

    const key = e.key;

    if(
        (key >= "0" && key <= "9") ||
        key === "." ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "%"
    ){
        append(key);
    }

    if(key === "Enter"){
        calculate();
    }

    if(key === "Backspace"){
        deleteLast();
    }

    if(key === "Escape"){
        clearDisplay();
    }
});

</script>

</body>
</html>
